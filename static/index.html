<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser VNC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #141414;
      --surface: #1f1f1f;
      --surface2: #2a2a2a;
      --surface3: #333;
      --border: #383838;
      --text: #e2e2e2;
      --muted: #888;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --green: #22c55e;
      --radius: 6px;
      --tab-radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #tabs-bar {
      background: var(--surface);
      display: flex;
      align-items: flex-end;
      padding: 8px 8px 0 8px;
      gap: 2px;
      overflow-x: auto;
      flex-shrink: 0;
      min-height: 42px;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface2);
      border: none;
      border-radius: var(--tab-radius) var(--tab-radius) 0 0;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      max-width: 200px;
      min-width: 80px;
    }
    .tab:hover { background: var(--surface3); }
    .tab.active { 
      background: var(--bg); 
      color: var(--text); 
    }
    .tab .tab-title { 
      overflow: hidden; 
      text-overflow: ellipsis; 
      flex: 1;
      text-align: left;
    }
    .tab .tab-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 4px;
      font-size: 12px;
      opacity: 0.5;
      flex-shrink: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .tab .tab-close:hover { 
      background: var(--danger); 
      opacity: 1; 
      color: white;
    }
    .tab.loading .tab-title::after { content: '...'; }
    #new-tab-btn {
      background: transparent;
      border: none;
      border-radius: var(--tab-radius);
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
      padding: 4px 12px;
      margin-bottom: 4px;
      transition: background 0.15s, color 0.15s;
    }
    #new-tab-btn:hover { background: var(--surface2); color: var(--text); }

    #toolbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      height: 44px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      border-radius: var(--radius);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 4px 7px;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn:disabled { opacity: 0.35; cursor: default; }

    #url-bar {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      padding: 6px 14px;
      transition: border-color 0.15s;
    }
    #url-bar:focus { border-color: var(--accent); }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      padding: 5px 12px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #333; }
    .btn.primary { background: var(--accent); border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.danger  { background: var(--danger);  border-color: var(--danger); }
    .btn.danger:hover { background: var(--danger-hover); }

    .divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #conn-dot.connected { background: var(--green); }

    #setup-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
    }
    .card h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .card p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.03em; text-transform: uppercase; }
    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      padding: 8px 12px;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }

    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }

    #launch-btn { width: 100%; padding: 10px; font-size: 15px; margin-top: 8px; }
    #error-msg  { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }

    #viewer-panel {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #progress-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: 10;
    }
    #progress-bar.active {
      animation: progress-anim 1.4s ease-in-out infinite;
    }
    @keyframes progress-anim {
      0%   { transform: scaleX(0);   transform-origin: left; }
      45%  { transform: scaleX(0.9); transform-origin: left; }
      46%  { transform: scaleX(0.9); transform-origin: right; }
      100% { transform: scaleX(0);   transform-origin: right; }
    }

    #canvas-wrap {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #0a0a0a;
    }

    #browser-canvas {
      display: block;
      cursor: default;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
    #browser-canvas:focus { outline: none; }

    #status-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 3px 12px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="tabs-bar" style="display:none">
  <button id="new-tab-btn" onclick="createSession()" title="New Tab">+</button>
</div>

<div id="toolbar">
  <button class="icon-btn" id="btn-back"    onclick="sendEvent({type:'back'})"    title="Back">&#8592;</button>
  <button class="icon-btn" id="btn-fwd"     onclick="sendEvent({type:'forward'})" title="Forward">&#8594;</button>
  <button class="icon-btn" id="btn-reload"  onclick="sendEvent({type:'reload'})"  title="Reload">&#8635;</button>
  <input  type="text" id="url-bar" placeholder="Enter URL and press Enter" onkeydown="onUrlKey(event)" />
  <button class="btn primary" onclick="goUrl()">Go</button>
  <div class="divider"></div>
  <div id="conn-dot" title="Connection status"></div>
</div>

<div id="setup-panel">
  <div class="card">
    <h1>Browser VNC</h1>
    <p>Connect to a CDP browser and control tabs in real-time.</p>

    <div class="field">
      <label>CDP URL</label>
      <input type="text" id="i-cdp" placeholder="http://127.0.0.1:18800" />
    </div>

    <div class="row">
      <div class="field">
        <label>Width</label>
        <input type="number" id="i-w" value="1280" min="320" max="3840" />
      </div>
      <div class="field">
        <label>Height</label>
        <input type="number" id="i-h" value="720" min="240" max="2160" />
      </div>
    </div>

    <button class="btn primary" id="launch-btn" onclick="createSession()">Enter</button>
    <div id="error-msg"></div>
  </div>
</div>

<div id="viewer-panel">
  <div id="progress-bar"></div>
  <div id="canvas-wrap">
    <canvas id="browser-canvas" tabindex="0"></canvas>
  </div>
</div>

<div id="status-bar">
  <span id="sb-url" title="Current page URL">-</span>
  <span id="sb-info">Disconnected</span>
</div>

<script>
let ws = null;
let canvas = null;
let ctx = null;
let BW = 1280;
let BH = 720;

let targets = [];
let sessions = {};
let activeTabId = null;
let canvasInitialized = false;

function getCdpUrl() {
  return document.getElementById('i-cdp').value.trim() || '';
}

async function loadTargets() {
  const cdpUrl = getCdpUrl();
  try {
    const url = cdpUrl ? `/api/targets?cdp_url=${encodeURIComponent(cdpUrl)}` : '/api/targets';
    const resp = await fetch(url);
    targets = await resp.json();
    renderTargetTabs();
  } catch (e) {
    console.error('Failed to load targets:', e);
  }
}

function renderTargetTabs() {
  const tabsBar = document.getElementById('tabs-bar');
  const newTabBtn = document.getElementById('new-tab-btn');
  
  document.querySelectorAll('.tab.target-tab').forEach(t => t.remove());
  
  targets.forEach(t => {
    const tab = document.createElement('button');
    tab.id = `target-${t.id}`;
    tab.className = 'tab target-tab';
    tab.dataset.targetId = t.id;
    const title = t.title || t.url || 'New Tab';
    const displayTitle = title.length > 30 ? title.slice(0, 30) + '...' : title;
    tab.innerHTML = `
      <span class="tab-title" title="${t.url || ''}">${displayTitle}</span>
      <span class="tab-close" onclick="event.stopPropagation(); closeTargetTab('${t.id}')">&#10005;</span>
    `;
    tab.onclick = () => attachToTarget(t.id);
    tabsBar.insertBefore(tab, newTabBtn);
  });
  
  document.getElementById('tabs-bar').style.display = 'flex';
}

function ensureSessionRecord(sessionId, patch = {}) {
  const current = sessions[sessionId] || { session_id: sessionId };
  sessions[sessionId] = { ...current, ...patch, session_id: sessionId };
  return sessions[sessionId];
}

function sessionTitleFromUrl(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    return u.hostname + (u.pathname !== '/' ? u.pathname : '');
  } catch {
    return url;
  }
}

function getSessionDisplayTitle(session) {
  if (session.title) return session.title;
  if (session.url) return sessionTitleFromUrl(session.url);
  return session.loading ? 'Loading' : 'New Tab';
}

function renderSessionTab(sessionId) {
  const session = ensureSessionRecord(sessionId);
  const tabsBar = document.getElementById('tabs-bar');
  const newTabBtn = document.getElementById('new-tab-btn');

  let tab = document.getElementById(`tab-${sessionId}`);
  if (!tab) {
    tab = document.createElement('button');
    tabsBar.insertBefore(tab, newTabBtn);
  }

  tab.id = `tab-${sessionId}`;
  tab.className = 'tab';
  if (session.loading) tab.classList.add('loading');
  tab.innerHTML = `
    <span class="tab-title"></span>
    <span class="tab-close" onclick="event.stopPropagation(); closeTab('${sessionId}')">&#10005;</span>
  `;
  tab.onclick = () => switchToTab(sessionId);

  const titleEl = tab.querySelector('.tab-title');
  const title = getSessionDisplayTitle(session);
  titleEl.textContent = title;
  titleEl.title = session.title || session.url || title;
}

function applySessionToViewer(sessionId) {
  const session = sessions[sessionId];
  if (!session) return;
  updateUrlBar(session.url || '');
  setLoading(!!session.loading);
}

function updateSessionState(sessionId, patch = {}) {
  const session = ensureSessionRecord(sessionId, patch);
  renderSessionTab(sessionId);
  if (sessionId === activeTabId) {
    applySessionToViewer(sessionId);
  }
  return session;
}

async function closeTargetTab(targetId) {
  const tab = document.getElementById(`target-${targetId}`);
  if (tab) tab.remove();
  
  targets = targets.filter(t => t.id !== targetId);
  
  const cdpUrl = getCdpUrl();
  const url = cdpUrl ? `/api/close-target/${targetId}?cdp_url=${encodeURIComponent(cdpUrl)}` : `/api/close-target/${targetId}`;
  await fetch(url, { method: 'DELETE' }).catch(() => {});
}

async function attachToTarget(targetId) {
  const w = parseInt(document.getElementById('i-w').value) || 1280;
  const h = parseInt(document.getElementById('i-h').value) || 720;
  const cdpUrl = getCdpUrl();
  const target = targets.find(t => t.id === targetId);
  
  const tab = document.getElementById(`target-${targetId}`);
  if (tab) {
    tab.classList.add('loading');
    const titleEl = tab.querySelector('.tab-title');
    if (titleEl) titleEl.textContent = 'Connecting...';
  }

  try {
    const body = { target_id: targetId, width: w, height: h };
    if (cdpUrl) body.cdpUrl = cdpUrl;

    const resp = await fetch('/api/attach', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(e.detail || 'Server error');
    }
    const info = await resp.json();
    BW = w; BH = h;
    ensureSessionRecord(info.session_id, {
      ...info,
      targetId,
      title: target?.title || '',
      url: target?.url || '',
      loading: true,
    });
    
    if (tab) {
      tab.id = `tab-${info.session_id}`;
      tab.classList.remove('target-tab');
      tab.dataset.sessionId = info.session_id;
    }

    renderSessionTab(info.session_id);
    
    connectToSession(info.session_id, info.ws_url);
  } catch (e) {
    console.error('Failed to attach:', e);
    if (tab) {
      tab.classList.remove('loading');
      if (target) {
        const title = target.title || target.url || 'New Tab';
        const titleEl = tab.querySelector('.tab-title');
        if (titleEl) titleEl.textContent = title;
      }
    }
  }
}

async function createSession() {
  const w = parseInt(document.getElementById('i-w').value) || 1280;
  const h = parseInt(document.getElementById('i-h').value) || 720;
  const cdpUrl = getCdpUrl();
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  document.getElementById('launch-btn').disabled = true;
  document.getElementById('launch-btn').textContent = 'Entering...';

  try {
    const body = { width: w, height: h };
    if (cdpUrl) body.cdpUrl = cdpUrl;

    const resp = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(e.detail || 'Server error');
    }
    const info = await resp.json();
    BW = w; BH = h;
    ensureSessionRecord(info.session_id, { ...info, loading: true });
    
    addOrUpdateTab(info.session_id);
    connectToSession(info.session_id, info.ws_url);
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    document.getElementById('launch-btn').disabled = false;
    document.getElementById('launch-btn').textContent = 'Enter';
  }
}

function connectToSession(sessionId, wsPath) {
  if (activeTabId && ws) {
    ws.close();
    ws = null;
  }
  
  activeTabId = sessionId;
  
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}${wsPath}`;
  ws = new WebSocket(url);
  ws.onopen = () => onOpen(sessionId);
  ws.onmessage = ev => onMessage(sessionId, ev);
  ws.onclose = () => onClose(sessionId);
  ws.onerror = e => console.error('[WS] error', e);
  
  setActiveTab(sessionId);
  showViewer();
}

function addOrUpdateTab(sessionId) {
  renderSessionTab(sessionId);
  setActiveTab(sessionId);
}

function setActiveTab(sessionId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById(`tab-${sessionId}`);
  if (tab) tab.classList.add('active');
  activeTabId = sessionId;
  applySessionToViewer(sessionId);
}

function switchToTab(sessionId) {
  if (sessionId === activeTabId) return;
  
  if (ws) {
    ws.close();
    ws = null;
  }
  
  const s = sessions[sessionId];
  if (s) {
    connectToSession(sessionId, s.ws_url);
  }
}

async function closeTab(sessionId) {
  const tab = document.getElementById(`tab-${sessionId}`);
  if (tab) tab.remove();
  
  const isActive = sessionId === activeTabId;
  
  if (isActive) {
    if (ws) {
      ws.close();
      ws = null;
    }
    activeTabId = null;
  }
  
  delete sessions[sessionId];
  
  await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' }).catch(() => {});
  
  const remaining = Object.keys(sessions);
  if (remaining.length > 0 && isActive) {
    switchToTab(remaining[0]);
  } else if (remaining.length === 0) {
    document.getElementById('setup-panel').style.display = 'flex';
    document.getElementById('viewer-panel').style.display = 'none';
    loadTargets();
  }
}

function onOpen(sessionId) {
  setStatus('Connected');
  dot(true);
  initCanvas();
  applySessionToViewer(sessionId);
}

function onClose(sessionId) {
  setStatus('Disconnected');
  dot(false);
  if (sessionId === activeTabId) {
    ws = null;
  }
}

function showSetup() {
  document.getElementById('setup-panel').style.display = 'flex';
  document.getElementById('viewer-panel').style.display = 'none';
  document.getElementById('tabs-bar').style.display = 'flex';
  document.getElementById('url-bar').value = '';
  document.getElementById('url-bar').placeholder = 'Enter URL after connecting';
  loadTargets();
}

function showViewer() {
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('viewer-panel').style.display = 'flex';
  document.getElementById('tabs-bar').style.display = 'flex';
}

function initCanvas() {
  canvas = document.getElementById('browser-canvas');
  ctx = canvas.getContext('2d');
  canvas.width = BW;
  canvas.height = BH;
  fitCanvas();
  if (!canvasInitialized) {
    window.addEventListener('resize', fitCanvas);

    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('dblclick', onDblClick);
    canvas.addEventListener('wheel', onWheel, { passive: false });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    canvas.addEventListener('keydown', onKeyDown);
    canvas.addEventListener('keyup', onKeyUp);
    canvas.addEventListener('click', () => canvas.focus());
    canvasInitialized = true;
  }
  canvas.focus();
}

function fitCanvas() {
  if (!canvas) return;
  const wrap = document.getElementById('canvas-wrap');
  const scale = Math.min(wrap.clientWidth / BW, wrap.clientHeight / BH);
  canvas.style.width = Math.floor(BW * scale) + 'px';
  canvas.style.height = Math.floor(BH * scale) + 'px';
}

function onMessage(sessionId, ev) {
  let msg;
  try { msg = JSON.parse(ev.data); } catch { return; }

  switch (msg.type) {
    case 'state':
      updateSessionState(sessionId, {
        url: msg.url || '',
        title: msg.title || '',
        loading: !!msg.loading,
      });
      break;
    case 'frame':
      drawFrame(msg.data, msg.format || 'jpeg');
      updateSessionState(sessionId, {
        url: msg.url || '',
        title: msg.title || '',
        loading: !!msg.loading,
      });
      break;
    case 'navigate':
      updateSessionState(sessionId, {
        url: msg.url || '',
        title: msg.title || sessions[sessionId]?.title || '',
      });
      break;
    case 'loading':
      updateSessionState(sessionId, { loading: true });
      break;
    case 'loaded':
      updateSessionState(sessionId, { loading: false });
      break;
  }
}

const _imgPool = [];
function drawFrame(b64, fmt) {
  if (!ctx) return;
  const img = _imgPool.pop() || new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, BW, BH);
    _imgPool.push(img);
  };
  img.src = `data:image/${fmt};base64,${b64}`;
}

function sendEvent(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

function canvasXY(e) {
  const r = canvas.getBoundingClientRect();
  const sx = BW / r.width;
  const sy = BH / r.height;
  return {
    x: Math.round((e.clientX - r.left) * sx),
    y: Math.round((e.clientY - r.top) * sy),
  };
}

function mods(e) {
  return (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);
}

const BTN = { 0: 'left', 1: 'middle', 2: 'right' };

function onMouseMove(e) {
  const { x, y } = canvasXY(e);
  sendEvent({ type: 'mousemove', x, y, modifiers: mods(e) });
}

function onMouseDown(e) {
  e.preventDefault();
  canvas.focus();
  const { x, y } = canvasXY(e);
  sendEvent({ type: 'mousedown', x, y, button: BTN[e.button] || 'left', clickCount: 1, modifiers: mods(e) });
}

function onMouseUp(e) {
  e.preventDefault();
  const { x, y } = canvasXY(e);
  sendEvent({ type: 'mouseup', x, y, button: BTN[e.button] || 'left', clickCount: 1, modifiers: mods(e) });
}

function onDblClick(e) {
  const { x, y } = canvasXY(e);
  const m = mods(e);
  sendEvent({ type: 'mousedown', x, y, button: 'left', clickCount: 2, modifiers: m });
  sendEvent({ type: 'mouseup',   x, y, button: 'left', clickCount: 2, modifiers: m });
}

function onWheel(e) {
  e.preventDefault();
  const { x, y } = canvasXY(e);
  sendEvent({ type: 'wheel', x, y, deltaX: e.deltaX, deltaY: e.deltaY, modifiers: mods(e) });
}

const KEY_CODE_MAP = {
  Backspace:8, Tab:9, Enter:13, Escape:27,
  Space:32, PageUp:33, PageDown:34, End:35, Home:36,
  ArrowLeft:37, ArrowUp:38, ArrowRight:39, ArrowDown:40,
  Insert:45, Delete:46,
  F1:112, F2:113, F3:114, F4:115, F5:116, F6:117,
  F7:118, F8:119, F9:120, F10:121, F11:122, F12:123,
};

const PREVENT_DEFAULTS = new Set([
  'Tab', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
  'Backspace', 'Space', 'F1', 'F3', 'F5', 'F6',
]);

function onKeyDown(e) {
  if (PREVENT_DEFAULTS.has(e.key)) e.preventDefault();

  const m = mods(e);
  const keyCode = KEY_CODE_MAP[e.key] || e.keyCode || 0;

  const isPrintable = e.key.length === 1 && !e.ctrlKey && !e.metaKey;
  const text = isPrintable
    ? e.key
    : (e.key === 'Enter' ? '\r' : e.key === 'Tab' ? '\t' : '');

  sendEvent({ type: 'keydown', key: e.key, code: e.code, text, modifiers: m, keyCode });
}

function onKeyUp(e) {
  const keyCode = KEY_CODE_MAP[e.key] || e.keyCode || 0;
  sendEvent({ type: 'keyup', key: e.key, code: e.code, modifiers: mods(e), keyCode });
}

function onUrlKey(e) {
  if (e.key === 'Enter') goUrl();
}

function goUrl() {
  const url = document.getElementById('url-bar').value.trim();
  if (url) sendEvent({ type: 'navigate', url });
  if (canvas) canvas.focus();
}

function dot(on) {
  document.getElementById('conn-dot').classList.toggle('connected', on);
}

function setStatus(s) {
  document.getElementById('sb-info').textContent = s;
}

function updateUrlBar(url) {
  document.getElementById('url-bar').value = url;
  document.getElementById('sb-url').textContent = url || '-';
  document.getElementById('sb-url').title = url || '-';
}

function setLoading(on) {
  document.getElementById('progress-bar').classList.toggle('active', on);
}

const qs = new URLSearchParams(location.search);
if (qs.has('session')) {
  const sid = qs.get('session');
  BW = parseInt(qs.get('w') || '1280');
  BH = parseInt(qs.get('h') || '720');
  ensureSessionRecord(sid, { ws_url: `/ws/${sid}`, loading: true });
  addOrUpdateTab(sid);
  connectToSession(sid, `/ws/${sid}`);
} else {
  loadTargets();
}
</script>
</body>
